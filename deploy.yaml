apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-demo
  namespace: argocd-deployment
spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-demo

  template:

    metadata:
      labels:
        app: java-demo

    spec:
      containers:

      - name: java-demo
        image: naveen352/java-demo-argocd:v7
        ports:
        - containerPort: 8081

---

apiVersion: v1
kind: Service
metadata:
  name: java-demo-service
  namespace: argocd-deployment
spec:
  selector:
    app: java-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
  type: NodePort

  